<!DOCTYPE html>
<html lang="de">

    <style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;

html, body {
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    color: #242424;
    background: #ffffff;
    overflow: hidden;

/* ── Loading / Error ── */

#loading {
    padding: 24px;
    text-align: center;
    color: #616161;
}

#error {
    padding: 16px 20px;
    color: #b91c1c;
    background: #fef2f2;
    border-left: 4px solid #ef4444;
    margin: 12px;
    border-radius: 2px;
}

/* ── Layout ── */

#content {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.toolbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    background: #f5f5f5;
    border-bottom: 1px solid #d1d1d1;
}

.table-wrapper {
    flex: 1;
    overflow: auto;
}

/* ── Buttons ── test */

.btn-primary {
    padding: 5px 16px;
    background: #0078d4;
    color: #ffffff;
    border: none;
    border-radius: 2px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
}

.btn-primary:hover:not(:disabled) {
    background: #106ebe;
}

.btn-primary:disabled {
    background: #c8c8c8;
    cursor: default;
}

/* ── Status text ── */

.status-text {
    font-size: 12px;
    color: #616161;
}

.status-text.success {
    color: #107c10;
}

.status-text.error {
    color: #b91c1c;
}

/* ── Table ── */

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 480px;
}

thead tr {
    position: sticky;
    top: 0;
    z-index: 3;
}

th {
    background: #1b3a5e;
    color: #ffffff;
    font-weight: 600;
    padding: 8px 12px;
    text-align: center;
    white-space: nowrap;
    border-right: 1px solid #2d5080;
}

th:last-child {
    border-right: none;
}

th.col-label-header {
    text-align: left;
    background: #142d4a;
    position: sticky;
    left: 0;
    z-index: 4;
}

th.col-current {
    background: #005a9e;
    border-left: 2px solid #ffd54f;
    border-right: 2px solid #ffd54f;
}

/* ── Body cells ── */

td {
    padding: 3px 10px;
    border-bottom: 1px solid #edebe9;
    text-align: center;
    vertical-align: middle;
}

td.col-label {
    font-weight: 600;
    background: #fafafa;
    color: #323130;
    text-align: left;
    padding-left: 12px;
    position: sticky;
    left: 0;
    z-index: 1;
    border-right: 1px solid #d1d1d1;
}

td.col-current {
    background: #f0f6ff;
    border-left: 2px solid #ffd54f;
    border-right: 2px solid #ffd54f;
}

td.col-readonly {
    color: #424242;
}

tr:hover td {
    background: #f3f2f1;
}

tr:hover td.col-label {
    background: #edebe9;
}

tr:hover td.col-current {
    background: #e5effa;
}

/* ── Value input ── */

.value-input {
    width: 80px;
    padding: 3px 6px;
    border: 1px solid #d1d1d1;
    border-radius: 2px;
    font-family: inherit;
    font-size: 13px;
    text-align: right;
    background: #ffffff;
    color: #242424;
    transition: border-color 0.15s, box-shadow 0.15s;
}

.value-input:focus {
    outline: none;
    border-color: #0078d4;
    box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.25);
}

.value-input.dirty {
    background: #fffde7;
    border-color: #f59e0b;
}

/* ── Read-only value text ── */

.value-text {
    font-variant-numeric: tabular-nums;
}

.value-empty {
    color: #bdbdbd;
}

/* ── Scrollbar (Webkit) ── */

.table-wrapper::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

.table-wrapper::-webkit-scrollbar-track {
    background: #f5f5f5;
}

.table-wrapper::-webkit-scrollbar-thumb {
    background: #c1c1c1;
    border-radius: 4px;
}

.table-wrapper::-webkit-scrollbar-thumb:hover {
    background: #a8a8a8;
}
    </style>
</head>
